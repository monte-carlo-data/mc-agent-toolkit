# Test-data dependencies (dev env):
#  - row_count_change_input_data (analytics-snowflake) — used in cd-03 clear
#    health check. Rich surface area (495 downstream, 41 monitors). Keep the
#    table existing and monitored.
#  - monolith_public_monolith_incidentmodel (analytics-snowflake) — used in cd-02
#    turn 2 investigation. Shallow lineage, ~1 recent alert. Keep the alert
#    present or the case will lose signal.
#
# If these tables change or alerts clear, update prompts accordingly.

cases:
  - id: cd-01-vague-data-issue
    turns:
      - prompt: "think something is wrong with my data, can you help?"
        criteria:
          # Agent should gather scope first, not dive into MC APIs.
          # Note: Read calls (to load skill files) are expected and should
          # NOT be counted against the agent — only MC MCP tool calls matter.
          must_not_call:
            - get_alerts
            - get_monitors
            - get_asset_lineage
            - search
    criteria:
      judge_rubric: |
        The agent should recognize the user's intent is ambiguous and ask
        clarifying questions (what symptom? which table or pipeline? when
        did it start?). It should NOT make Monte Carlo MCP API calls
        (get_alerts, search, get_table, etc.) before gathering context.

        NOTE: Do NOT penalize Read or Skill tool calls — those are the agent
        loading skill instructions, which is normal and expected.

        Good behavior: asks 1-3 targeted questions to narrow down the scope.
        Bad behavior: immediately calls Monte Carlo MCP tools (e.g., get_alerts,
        search) without knowing what the user is actually concerned about.

  - id: cd-02-vague-to-incident-flow
    turns:
      - prompt: "think something is wrong with my data, can you help?"
        criteria:
          # Turn 1: No MC MCP tool calls yet
          must_not_call:
            - get_alerts
            - get_monitors
      - prompt: "the monolith_public_monolith_incidentmodel table in analytics-snowflake warehouse got an alert, investigate it"
        criteria:
          # Turn 2: user named the specific table — agent should investigate.
          # `search` is expected (needed to resolve table name → MCON for
          # downstream get_table call). get_alerts should also fire.
          must_call:
            - search
            - get_alerts
    criteria:
      judge_rubric: |
        NOTE ON MULTI-TURN TRACES: The trace accumulates tool calls across
        BOTH turns. When scoring, separate "what happened on turn 1" from
        "what happened on turn 2" — do not attribute turn-2 tool calls to
        turn 1.

        Turn 1: Agent should ask clarifying questions about the symptom,
        table, or alert — NOT make MC MCP tool calls (get_alerts, search,
        etc.). Read/Skill tool calls are OK — those are skill loading.

        Turn 2: The user has named a specific table and warehouse. The
        agent should begin root cause analysis:
        - Query the table directly (get_table, get_alerts for that table)
        - `search` is NOT required — per skill guidance, skip it when
          table + warehouse are already named
        - Check freshness/lineage/queries to investigate root cause
        - Begin investigating WHY the alert fired

        It should NOT just report table metadata and stop. It should
        demonstrate incident-response behavior: investigation, not just
        a surface-level check.

        NOTE: Do NOT penalize Read or Skill tool calls — those are skill loading.

  - id: cd-03-clear-health-check-specific-table
    turns:
      - prompt: "check the health of the row_count_change_input_data table in analytics-snowflake warehouse"
        criteria:
          # Clear intent + table + warehouse. Agent should proceed directly
          # with a health check: search (to resolve name → MCON) then
          # get_table for details.
          must_call:
            - search
            - get_table
    criteria:
      judge_rubric: |
        This is a clear, specific health check request. Table + warehouse
        are named, so the agent should proceed directly:
        - Use search (tightly scoped — limit + warehouse filter) to resolve
          the name to an MCON
        - Fetch details via get_table, then freshness, alerts, monitoring coverage
        - Report health

        It should NOT stop to ask scoping questions for this prompt —
        the intent is clear and the table name is specific. If search
        returns multiple matches, it should pick the one in the named
        warehouse (analytics-snowflake) and proceed.

        NOTE: Do NOT penalize Read or Skill tool calls — those are skill loading.

  - id: cd-04-ambiguous-coverage
    turns:
      - prompt: "what should I monitor?"
        criteria:
          # Coverage intent — route to coverage analysis, NOT incident response
          must_not_call:
            - get_alerts
    criteria:
      judge_rubric: |
        The user is asking a coverage question. The agent should route
        toward coverage analysis (monitoring-advisor). It's acceptable to
        ask which warehouse to analyze, or
        to proceed with get_warehouses to discover scope. It should NOT
        jump to incident response (get_alerts) since no incident is mentioned.

        Good behavior: calls get_warehouses, get_use_cases, asks "which
        warehouse?", or begins coverage analysis.
        Bad behavior: calls get_alerts, treats this as an incident.

        NOTE: Do NOT penalize Read or Skill tool calls.

  - id: cd-05-unrelated-prompt
    turns:
      - prompt: "help me write a Python function to parse JSON"
        criteria:
          # Not data observability — no MC tools should be invoked
          must_not_call:
            - get_alerts
            - get_monitors
            - get_warehouses
            - get_use_cases
            - search
            - get_table
    criteria:
      judge_rubric: |
        This is a general programming question with no Monte Carlo or data
        observability context. No MC MCP tools should be invoked. The agent
        should just help with the Python task directly.
